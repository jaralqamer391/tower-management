<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جار القمر Pro v50 | التحكم الشامل</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030612; --panel: #0f172a; --accent: #0ea5e9;
            --gold: #eab308; --warn: #f97316; --danger: #ef4444;
            --success: #22c55e; --text: #f1f5f9; --border: #1e293b;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* الجوانب والوسط */
        .side-right { width: 320px; background: var(--panel); border-left: 1px solid var(--border); padding: 15px; overflow-y: auto; order: 1; }
        .main-col { flex: 1; background: #000; display: flex; flex-direction: column; overflow: hidden; order: 2; border-right: 2px solid var(--accent); }
        .side-left { width: 300px; background: var(--panel); border-right: 1px solid var(--border); padding: 15px; overflow-y: auto; order: 3; }

        header { padding: 12px 25px; background: #111827; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        
        /* كارت البرج */
        .tower-card { background: #0a0f1d; border: 1px solid var(--border); border-radius: 15px; margin-bottom: 30px; padding: 20px; position: relative; border-top: 4px solid var(--accent); }
        .tower-title { color: #0ea5e9; font-size: 28px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        
        .tower-stats-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .master-box { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
        .master-box label { display: block; color: var(--gold); font-size: 13px; margin-bottom: 5px; }
        .master-box input { width: 100%; background: transparent; border: none; color: #fff; text-align: center; font-size: 14px; outline: none; }
        
        .sector-box { background: rgba(30, 41, 59, 0.5); border: 1px solid var(--border); border-right: 5px solid var(--accent); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .inputs-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .inputs-group input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 5px; width: 100%; text-align: center; font-size: 13px; }
        
        .user-pill { background: #1e293b; border: 1px solid #334155; padding: 5px 12px; border-radius: 6px; margin: 4px; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-action { cursor: pointer; border: none; border-radius: 6px; padding: 10px 15px; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--accent); color: #fff; width: 100%; margin-top: 8px; }
        .btn-gold { background: var(--gold); color: #000; }
        
        select, .search-input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 10px; margin-top: 10px; }
        .stat-card { background: #111827; padding: 15px; border-radius: 12px; margin-bottom: 12px; text-align: center; border-bottom: 3px solid var(--accent); }
    </style>
</head>
<body>

    <aside class="side-right">
        <h3>🔍 البحث السريع</h3>
        <input type="text" id="searchBox" class="search-input" placeholder="اسم مشترك، سكتر، أو IP..." onkeyup="render()">
        <div style="margin-top:20px;">
            <label>قائمة الأبراج المكتشفة:</label>
            <select id="towerSelector" size="18" onchange="render()"></select>
        </div>
    </aside>

    <main class="main-col">
        <header>
            <div style="display:flex; gap:10px;">
                <button class="btn-action btn-gold" onclick="document.getElementById('xlIn').click()">📥 سحب ملف الإكسل (Excel)</button>
                <button class="btn-action" style="background:var(--success); color:#fff" onclick="addTower()">+ إضافة برج يدوي</button>
                <input type="file" id="xlIn" style="display:none" onchange="importXl(event)" accept=".xlsx, .xls">
            </div>
            <h2 style="margin:0;">جار القمر Pro v50</h2>
        </header>
        <div id="mainStage" style="padding: 20px; overflow-y: auto; flex: 1;">
            <center id="welcome" style="margin-top:150px; opacity:0.4;">
                <i class="fas fa-file-excel fa-4x"></i><br><br>
                النظام جاهز، بانتظار سحب ملف الإكسل لتوزيع الأبراج والسكترات تلقائياً
            </center>
        </div>
    </main>

    <aside class="side-left">
        <h2 style="color:var(--accent); text-align:center;">📊 إحصائيات الشبكة</h2>
        <div id="statsBox"></div>
        <h3 style="color:var(--danger)">⚠️ سكترات ممتلئة</h3>
        <div id="alertsBox"></div>
    </aside>

<script>
    let db = JSON.parse(localStorage.getItem('JAR_V50_FINAL_DATA')) || [];

    function save() { 
        localStorage.setItem('JAR_V50_FINAL_DATA', JSON.stringify(db)); 
        render(); 
    }

    function render() {
        const stage = document.getElementById('mainStage');
        const q = document.getElementById('searchBox').value.toLowerCase();
        const sel = document.getElementById('towerSelector').value;
        let html = ''; let alerts = ''; let st = { u: 0, s: 0 };

        let opts = '<option value="all">كل الأبراج</option>';
        db.forEach((t, i) => {
            opts += `<option value="${i}">${t.name}</option>`;
            if(sel !== 'all' && sel != i && sel !== "") return;

            let sHTML = '';
            t.sectors.forEach((s, si) => {
                if(q && !JSON.stringify(s).toLowerCase().includes(q)) return;
                st.s++; st.u += s.users.length;
                
                if(s.users.length >= 8) alerts += `<div class="stat-card" style="color:var(--danger)">📍 ${t.name} > ${s.name}</div>`;

                sHTML += `
                <div class="sector-box">
                    <div class="inputs-group">
                        <input value="${s.name}" onchange="db[${ti}].sectors[${si}].name=this.value; save()">
                        <input value="${s.ip}" onchange="db[${ti}].sectors[${si}].ip=this.value; save()">
                        <input value="${s.device}" onchange="db[${ti}].sectors[${si}].device=this.value; save()">
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="btn-action btn-blue" style="width:120px" onclick="window.open('http://${s.ip}')">دخول السكتر</button>
                        <span style="color:var(--accent)"><b>${s.users.length}</b> مشترك</span>
                    </div>
                    <div style="margin-top:10px;">
                        ${s.users.map((u, ui) => `
                            <span class="user-pill">
                                <i class="fas fa-exchange-alt" style="color:var(--gold); cursor:pointer" title="نقل" onclick="transferUser(${ti}, ${si}, ${ui})"></i>
                                ${u}
                                <i class="fas fa-trash" style="color:var(--danger); cursor:pointer" onclick="db[${ti}].sectors[${si}].users.splice(${ui},1); save()"></i>
                            </span>
                        `).join('')}
                    </div>
                </div>`;
            });

            html += `
            <div class="tower-card">
                <i class="fas fa-trash" style="position:absolute; top:20px; left:20px; color:var(--danger); cursor:pointer;" onclick="if(confirm('حذف البرج؟')){db.splice(${ti},1); save()}"></i>
                <div class="tower-title">${t.name}</div>
                <div class="tower-stats-top">
                    <div class="master-box"><label>SL</label><input value="${t.sl||''}" onchange="db[${ti}].sl=this.value; save()"><button class="btn-blue" onclick="window.open('http://${t.sl}')">دخول</button></div>
                    <div class="master-box"><label>MA</label><input value="${t.ma||''}" onchange="db[${ti}].ma=this.value; save()"><button class="btn-blue" onclick="window.open('http://${t.ma}')">دخول</button></div>
                    <div class="master-box"><label>SW</label><input value="${t.sw||''}" onchange="db[${ti}].sw=this.value; save()"><button class="btn-blue" onclick="window.open('http://${t.sw}')">دخول</button></div>
                </div>
                ${sHTML}
            </div>`;
        });

        document.getElementById('towerSelector').innerHTML = opts;
        if(sel) document.getElementById('towerSelector').value = sel;
        stage.innerHTML = html || document.getElementById('welcome').outerHTML;
        document.getElementById('statsBox').innerHTML = `<div class="stat-card"><h2>${st.u}</h2><small>مشترك كلي</small></div><div class="stat-card"><h2>${st.s}</h2><small>سكتر كلي</small></div>`;
        document.getElementById('alertsBox').innerHTML = alerts || 'الشبكة مستقرة ✅';
    }

    // وظيفة سحب الإكسل المحدثة (الأكثر استقراراً)
    function importXl(e) {
        const file = e.target.files[0];
        if (!file) { alert("فشل في اختيار الملف!"); return; }

        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
                
                let newDb = [];
                let curT = null;

                rows.forEach(row => {
                    const cells = row.map(c => String(c || '').trim());
                    // البحث عن "برج"
                    let foundTower = cells.find(c => c.includes("برج"));
                    if (foundTower) {
                        curT = { name: foundTower, sw:'', ma:'', sl:'', sectors: [] };
                        newDb.push(curT);
                    } 
                    // البحث عن IP السكتر 10.205
                    else if (curT) {
                        let ip = cells.find(c => c.startsWith("10.205."));
                        if (ip) {
                            curT.sectors.push({
                                name: cells[1] || "سكتر",
                                ip: ip,
                                device: 'SXT/LHG',
                                users: cells.filter(c => c.length > 2 && !c.startsWith("10.205.") && !c.includes("برج"))
                            });
                        }
                    }
                });

                if(newDb.length > 0) {
                    db = newDb;
                    save();
                    alert("تم سحب " + db.length + " برج بنجاح!");
                } else {
                    alert("الملف لا يحتوي على كلمات 'برج' أو '10.205'!");
                }
            } catch (err) {
                alert("خطأ في قراءة ملف الإكسل: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function transferUser(ti, si, ui) {
        let u = db[ti].sectors[si].users[ui];
        let tIdx = prompt("رقم البرج الجديد (مثلاً 0 أو 1):");
        let sIdx = prompt("رقم السكتر الجديد (مثلاً 0 أو 1):");
        if(db[tIdx] && db[tIdx].sectors[sIdx]) {
            db[tIdx].sectors[sIdx].users.push(u);
            db[ti].sectors[si].users.splice(ui, 1);
            save();
        }
    }

    function addTower() { let n = prompt("الاسم:"); if(n) {db.push({name:n, sw:'', ma:'', sl:'', sectors:[]}); save();} }
    
    window.onload = render;
</script>
</body>
</html>
