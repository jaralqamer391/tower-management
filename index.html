<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الشبكة - جار القمر</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="stats-section">
            <div class="header">
                <h2>إحصائيات الشبكة <i class="fas fa-chart-line"></i></h2>
            </div>
            
            <div class="stat-card">
                <span>إجمالي المشتركين</span>
                <h1 id="total-subs">89</h1>
            </div>

            <div class="stat-card">
                <span>إجمالي السكترات</span>
                <h1 id="total-sectors" style="color: #f1c40f;">13</h1>
            </div>

            <hr style="border: 0.5px solid #30363d; margin: 20px 0;">

            <div class="warning-header">
                <h3><i class="fas fa-exclamation-triangle"></i> تنبيهات المتابعة</h3>
            </div>

            <div id="status-list" class="status-list">
                </div>
        </div>

        <div class="control-section">
            <div class="search-box">
                <label>بحث سريع <i class="fas fa-search"></i></label>
                <input type="text" id="searchInput" placeholder="ابحث عن اسم، رقم، أو برج...">
            </div>

            <div class="tower-select">
                <label>تصفية حسب البرج:</label>
                <select id="towerFilter">
                    <option value="all">كل الأبراج</option>
                    <option value="برج احسان 4">برج احسان 4</option>
                    <option value="برج المركز">برج المركز</option>
                    <option value="برج كرار">برج كرار</option>
                </select>
            </div>

            <div class="quick-links">
                <p>اختصارات الدخول:</p>
                <div id="quick-buttons">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
