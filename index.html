<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جار القمر Pro v49 | النظام الشامل</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div class="top-nav">
        <div class="logo"> <i class="fas fa-network-wired"></i> جار القمر Pro v49 </div>
        <div class="top-buttons">
            <button class="btn-green"> <i class="fas fa-plus"></i> برج يدوي </button>
            <label for="excel-upload" class="btn-yellow">
                <i class="fas fa-file-download"></i> استيراد الإكسل الشامل
            </label>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none">
        </div>
    </div>

    <div class="main-layout">
        <div class="right-sidebar">
            <div class="search-section">
                <h3><i class="fas fa-search"></i> بحث سريع</h3>
                <input type="text" id="searchInput" placeholder="ابحث عن أي شيء...">
                
                <label>اختر البرج:</label>
                <select id="towerFilter">
                    <option>برج احسان 4</option>
                    <option>برج المركز</option>
                </select>
            </div>

            <div class="alerts-section">
                <h3 style="color: #ff4757;"><i class="fas fa-exclamation-triangle"></i> دخول مباشر للأعطال:</h3>
                <div id="quick-links">
                    <button class="btn-orange">دخول - Karrar-B2-07814120492</button>
                    <button class="btn-orange">دخول - Karrar-C1-07814120492</button>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="tower-header">
                <span class="tower-title">برج احسان 4</span>
                <span class="sector-count">13 سكتر</span>
                <i class="fas fa-trash delete-icon"></i>
            </div>

            <div class="sectors-grid" id="main-display">
                <div class="sector-card">
                    <div class="sector-info">
                        <div class="info-row"><span>اسم السكتر:</span> <strong>Karrar-A1-07814120492</strong></div>
                        <div class="info-row"><span>IP السكتر:</span> <strong>10.205.235.5</strong></div>
                        <div class="info-row"><span>موديل الجهاز:</span> <strong>SXT, LHG...</strong></div>
                    </div>
                    <div class="users-section">
                        <span class="user-count">6 مستخدم</span>
                        <div class="user-tags">
                            <span>مصطفى صلاح هلال <i class="fas fa-times"></i></span>
                            <span>علاء عبد الله مطلب <i class="fas fa-times"></i></span>
                        </div>
                    </div>
                    <button class="btn-login" onclick="window.open('http://10.205.235.5')">دخول مباشر</button>
                </div>
            </div>
        </div>

        <div class="left-sidebar">
            <h3><i class="fas fa-chart-pie"></i> إحصائيات</h3>
            <div class="stat-box">
                <p>إجمالي المشتركين</p>
                <h2 style="color: #2ecc71;">89</h2>
            </div>
            <div class="stat-box">
                <p>إجمالي السكترات</p>
                <h2 style="color: #f1c40f;">13</h2>
            </div>
            <div class="alert-list">
                <p style="color: #e74c3c;">📍 سكترات بحاجة لمتابعة</p>
                <div class="alert-item">📍 برج احسان 4 (ممتلئ)</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
